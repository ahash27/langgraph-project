name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          source venv/bin/activate
          echo "✅ Tests will be added here"
          # pytest tests/
      
      - name: Lint check
        run: |
          source venv/bin/activate
          echo "✅ Linting will be added here"
          # ruff check .
