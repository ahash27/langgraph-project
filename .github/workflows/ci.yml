name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black mypy
      
      - name: Code formatting check (Black)
        run: |
          black --check app/ tests/ api/
        continue-on-error: true
      
      - name: Lint with Ruff
        run: |
          ruff check app/ tests/ api/
        continue-on-error: true
      
      - name: Type check with MyPy
        run: |
          mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true
      
      - name: Check code complexity
        run: |
          pip install radon
          radon cc app/ -a -nb
        continue-on-error: true
      
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        continue-on-error: true
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Check for security vulnerabilities
        run: |
          safety check --json || true
          bandit -r app/ -f json || true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Verify project structure
        run: |
          echo "✅ Checking project structure..."
          test -d app/graphs && echo "✅ graphs/ exists"
          test -d app/nodes && echo "✅ nodes/ exists"
          test -d app/services && echo "✅ services/ exists"
          test -f main.py && echo "✅ main.py exists"
          test -f requirements.txt && echo "✅ requirements.txt exists"
      
      - name: Install and validate
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "from app.graphs.sample_graph import build_graph; print('✅ Import successful')"
